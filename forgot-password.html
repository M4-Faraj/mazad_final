<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MAZAD | Forgot Password</title>

  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/forgot-password.css">
</head>
<body>

  <header>
    <div class="header-left">
      <div class="logo-slot">
        <img src="logo (1).png" alt="Mazad Left Logo">
      </div>
      <div class="brand-block">
        <span class="brand-kicker">Online Auction Platform</span>
        <div class="logo">MAZAD</div>
      </div>
    </div>

    <div id="google_translate_element" style="display:none;"></div>

    <div class="header-center">
      <nav>
        <a href="index.html">Home</a>
        <a href="login.html">Login</a>
      </nav>
    </div>

    <div class="header-right">
      <div class="lang-switch">
        <button id="gtToggle" class="btn btn-secondary" type="button">AR</button>
      </div>
      <div class="logo-slot">
        <img src="logo (2).png" alt="Mazad Right Logo">
      </div>
    </div>
  </header>

  <main class="fp-main">
    <div class="fp-card forgot-card">

      <div class="fp-head">
        <span class="fp-kicker">Account Recovery</span>
        <h1 class="fp-title">Reset your password</h1>
        <p class="fp-sub">We'll email you a 6-digit code to verify it's really you.</p>
      </div>

      <div class="fp-steps">
        <div class="fp-step is-active" id="chip1"><b>1</b><span>Email</span></div>
        <div class="fp-step-line"></div>
        <div class="fp-step" id="chip2"><b>2</b><span>Verify</span></div>
        <div class="fp-step-line"></div>
        <div class="fp-step" id="chip3"><b>3</b><span>New Password</span></div>
      </div>

      <!-- STEP 1 -->
      <section class="fp-screen is-active" id="screen1">
        <div class="field" data-field="recoverEmail">
          <label class="field-label" for="recoverEmail">Email address</label>
          <input id="recoverEmail" type="email" placeholder="you@example.com" autocomplete="email">
          <div class="field-error"></div>
        </div>

        <button class="fp-primary" id="sendCodeBtn" type="button">Send Recovery Code</button>

        <div class="fp-meta">
          <button class="fp-link" type="button" id="goLoginBtnTop">Back to login</button>
        </div>
      </section>

      <!-- STEP 2 -->
      <section class="fp-screen" id="screen2">
        <div class="fp-otp-top">
          <div class="fp-timer" id="otpTimer">01:30</div>
          <div class="fp-otp-hint">Code expires soon</div>
        </div>

        <div class="field" data-field="otpCode">
          <label class="field-label">Verification code</label>
          <div class="fp-otp-grid">
            <input class="otp-input" maxlength="1" inputmode="numeric">
            <input class="otp-input" maxlength="1" inputmode="numeric">
            <input class="otp-input" maxlength="1" inputmode="numeric">
            <input class="otp-input" maxlength="1" inputmode="numeric">
            <input class="otp-input" maxlength="1" inputmode="numeric">
            <input class="otp-input" maxlength="1" inputmode="numeric">
          </div>
          <div class="field-error"></div>
        </div>

        <button class="fp-primary" id="verifyBtn" type="button">Verify Code</button>

        <div class="fp-meta">
          <button class="fp-link" type="button" id="resendBtn">Resend code</button>
          <button class="fp-link" type="button" id="backToEmailBtn">Back</button>
        </div>
      </section>

      <!-- STEP 3 -->
      <section class="fp-screen" id="screen3">
        <div class="field" data-field="newPasswordWrap">
          <label class="field-label" for="newPassword">New password</label>
          <div class="fp-pass-wrap">
            <input id="newPassword" type="password" placeholder="At least 8 characters">
            <button class="toggle-password" type="button" data-target="newPassword">Show</button>
          </div>
          <div class="fp-strength"><div class="fp-strength-bar" id="strengthBar"></div></div>
          <div class="fp-strength-text" id="strengthText">Password strength will appear here</div>
          <div class="field-error"></div>
        </div>

        <div class="field" data-field="confirmPasswordWrap">
          <label class="field-label" for="confirmPassword">Confirm password</label>
          <div class="fp-pass-wrap">
            <input id="confirmPassword" type="password" placeholder="Repeat your password">
            <button class="toggle-password" type="button" data-target="confirmPassword">Show</button>
          </div>
          <div class="field-error"></div>
        </div>

        <button class="fp-primary" id="saveBtn" type="button">Save New Password</button>

        <div class="fp-meta">
          <button class="fp-link" type="button" id="goLoginBtnBottom">Back to login</button>
        </div>
      </section>

      <div class="fp-toast" id="forgotToast"></div>

      <!-- Hidden legacy hooks so old JS doesn't NPE -->
      <span id="forgotBrandCopy" style="display:none"></span>
      <span id="forgotKicker" style="display:none"></span>
      <span id="forgotHeroTitle" style="display:none"></span>
      <span id="forgotHeroText" style="display:none"></span>
      <span id="forgotMiniNote" style="display:none"></span>
    </div>
  </main>

  <script src="js/google-translate.js"></script>
  <script src="js/forgot-password.js"></script>
  <script>
    initGoogleTranslate();
  </script>
</body>
</html>
